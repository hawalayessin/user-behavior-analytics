services:
  # ── Backend ────────────────────────────
  backend:
    build: ./user-analytics-backend
    container_name: analytics_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Optional: seed an initial admin user at startup (dev/demo)
      ADMIN_EMAIL: admin@local.tn
      ADMIN_PASSWORD: admin123
      ADMIN_FULL_NAME: Administrator
      ADMIN_ROLE: admin
    volumes:
      - ./user-analytics-backend:/app
    ports:
      - "8000:8000"

  # ── Frontend ───────────────────────────
  frontend:
    build: ./analytics-platform-front
    container_name: analytics_frontend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      VITE_PROXY_TARGET: http://backend:8000
    volumes:
      - ./analytics-platform-front:/app
      - /app/node_modules
      - /app/.vite
    ports:
      - "5173:5173"